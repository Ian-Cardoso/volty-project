<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/pages/account.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/volty-header.css">
    <link rel="stylesheet" href="styles/pages/orders.css">
    <link rel="shortcut icon" href="images/volty-logo.ico" type="image/x-icon">
    <title>Account</title>
</head>
<body>

  <div class="volty-header">
      <div class="volty-header-left-section">
        <a href="volty.html" class="header-link">
          <img class="volty-logo"
            src="images/volty-logo.png">
          <img class="volty-mobile-logo"
            src="images/volty-logo-mobile.png.png">
        </a>
      </div>

      <div class="volty-header-right-section">
        <a class="orders-link header-link" href="orders.html">
          <span class="returns-text">Returns</span>
          <span class="orders-text">& Orders</span>
        </a>

        <a class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png">
          <div class="cart-quantity">3</div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>

    <div class="account-container">
    <h2>My account</h2>

    <section>
      <h3>Personal Information</h3>

      <label>
        Name
        <input type="text" id="name">
      </label>

      <label>
        E-mail
        <input type="email" id="email" disabled>
      </label>

      <button id="saveProfile">Save</button>
    </section>

    <section>
      <h3>Address</h3>

      <label>
        CEP
        <input type="text" id="cep">
      </label>

      <label>
        Street
        <input type="text" id="street">
      </label>

      <label>
        City
        <input type="text" id="city">
      </label>

      <label>
        State
        <input type="text" id="state">
      </label>

      <button id="saveAddress">Save address</button>
    </section>

    <section>
      <h3>Change password</h3>

      <label>
        New password
        <input type="password" id="newPassword">
      </label>

      <button id="changePassword">Change password</button>
    </section>

  </div>

  <script src="data/account.js"></script>

</body>
</html>
