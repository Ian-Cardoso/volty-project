<!DOCTYPE html>
<html>
  <head>
    <title>Checkout</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="../styles/shared/general.css">
    <link rel="stylesheet" href="../styles/pages/checkout/checkout-header.css">
    <link rel="stylesheet" href="../styles/pages/checkout/checkout.css">
    <link rel="shortcut icon" href="../images/volty-logo.ico" type="image/x-icon">
  </head>
  <body>
    <div class="checkout-header">
      <div class="header-content">
        <div class="checkout-header-left-section">
          <a href="volty.html">
            <img class="volty-logo" src="../images/volty-logo-blue.png">
            <img class="volty-mobile-logo" src="../images/volty-logo-mobile.png.png">
          </a>
        </div>

        <div class="checkout-header-middle-section">
          Checkout (<a class="return-to-home-link"
            href="volty.html"></a>)
        </div>

        <div class="checkout-header-right-section">
          <button id="themeToggle" class="theme-toggle" title="Toggle dark/light mode"><i class="fa-solid fa-moon"></i></button>
          <img src="../images/icons/checkout-lock-icon.png">
        </div>
      </div>
    </div>

    <div class="main">
      <div class="page-title">Review your order</div>

      <div class="checkout-grid">
        <div class="order-summary js-order-summary">
        
        </div>

        <div class="payment-summary js-payment-summary">         
        </div>
      </div>
    </div>
    
    <script type="module" src="../scripts/checkout.js"></script>
    <script src="../scripts/theme.js"></script>
  </body>
</html>
