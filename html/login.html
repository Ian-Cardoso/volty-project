<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="../styles/pages/forms.css">

</head>
<body>

<form class="register-form" id="loginForm">
  <h2>Join</h2>

  <label>
    E-mail
    <input type="email" id="email" required>
  </label>

  <label>
    Password
    <input type="password" id="password" required>
  </label>

  <button type="submit">Join</button>
  <p>
    Don't have an account?
    <a href="register.html">Create account</a>
  </p>
  <p style="text-align: center; margin-top: 10px;">
    <a href="#" id="forgotPasswordLink" style="color: #4ade80; font-size: 14px;">Forgot your password?</a>
  </p>

  <p class="error" id="errorMsg"></p>
</form>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="../data/login.js"></script>
</body>
</html>
