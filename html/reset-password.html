<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - Volty</title>
  <link rel="stylesheet" href="../styles/pages/forms.css">
</head>
<body>
  <form class="register-form" id="resetForm">
    <h2>Reset Password</h2>
    
    <p>Your new password must be at least 8 characters long.</p>

    <label>
      New Password
      <div class="password-wrapper">
        <input type="password" id="newPassword" required minlength="8">
        <i class="fa-solid fa-eye" id="togglePassword"></i>
      </div>
    </label>

    <label>
      Confirm New Password
      <div class="password-wrapper">
        <input type="password" id="confirmPassword" required minlength="8">
        <i class="fa-solid fa-eye" id="toggleConfirmPassword"></i>
      </div>
    </label>

    <button type="submit" id="resetBtn">Reset Password</button>

    <p class="error" id="errorMsg"></p>
    <p id="statusMsg"></p>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="../data/passwordReset.js"></script>
</body>
</html>
