<!DOCTYPE html>
<html>
  <head>
    <title>Volty Project</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <link rel="shortcut icon" href="images/volty-logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/volty-header.css">
    <link rel="stylesheet" href="styles/pages/volty.css">
    <link rel="stylesheet" href="./styles/pages/chat-ai.css">

  </head>
  <body>

    <div class="volty-header">
      <div class="volty-header-left-section">
        <a href="volty.html" class="header-link">
          <img class="volty-logo"
            src="images/volty-logo.png">
          <img class="volty-mobile-logo"
            src="images/volty-logo-mobile.png.png">
        </a>
      </div>

      <div class="volty-header-middle-section">
        <input class="search-bar" type="text" placeholder="Search">

        <button class="search-button">
          <img class="search-icon" src="images/icons/search-icon.png">
        </button>
      </div>

      <div class="volty-header-right-section">

        <a href="account.html" class="account-link header-link" id="accountLink">
  <i class="fa-solid fa-user"></i>
  <span class="account-text">Account</span>
</a>

        <a class="wishlist-link header-link" href="wishlist.html">
          <span class="wishlist-icon">❤️</span>
          <span class="wishlist-text">Wishlist</span>
        </a>

        <a class="orders-link header-link" href="orders.html">
          <span class="returns-text">Returns</span>
          <span class="orders-text">& Orders</span>
        </a> 

        <a class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png">
          <div class="cart-quantity js-cart-quantity">0</div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>
    
    <div class="main">
      <div class="products-grid js-products-grid">
        
      </div>
    </div>

        <div class="chat-fab" id="chatFab">
  🤖
</div>

<div class="chat-wrapper hidden" id="chatWrapper">
  <div class="chat-container">
    <div class="chat-header">
      <strong>Volty AI 🤖</strong>
      <span>Smart recommendations </span>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="bot-message">
        Tell me what you are looking for, and I will help you find the perfect products!  
      </div>
    </div>

    <div class="chat-input">
      <input
        type="text"
        id="chatInput"
        placeholder="Type what you are looking for..."
      />
      <button id="sendMessage">Submit</button>
    </div>
  </div>
</div>

    <script type="module" src="./data/chat-ai.js"></script>
    <script src="./data/chat-toogle.js"></script>
    <script type="module" src="./scripts/volty.js"></script>
    <script src="./scripts/auth-check.js"></script>

  </body>
  
</html>
